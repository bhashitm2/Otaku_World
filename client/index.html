<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Main_Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- "Nova" design system fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400..800&family=DM+Sans:opsz,wght@9..40,400..700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0B0B0F" />

    <!-- SEO Meta Tags -->
    <title>Otaku World — Anime & manga discovery</title>
    <meta
      name="description"
      content="Browse anime and manga, rank characters, and keep your favorites and watchlist in sync across every device."
    />
    <meta
      name="keywords"
      content="anime, manga, otaku, recommendations, watchlist, favorites, community"
    />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Otaku World — Anime & manga discovery" />
    <meta
      property="og:description"
      content="Browse anime and manga, rank characters, and track your watchlist."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://otaku-world.com" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Otaku World — Anime & manga discovery" />
    <meta
      name="twitter:description"
      content="Discover, track, and explore your favorite anime and manga."
    />

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="https://api.jikan.moe" />
    <link rel="dns-prefetch" href="https://cdn.myanimelist.net" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
