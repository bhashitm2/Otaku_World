services:
  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - anime-network

  # Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGO_URI: "${MONGO_URI:?MONGO_URI must be set}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:?FIREBASE_PROJECT_ID must be set}"
      FIREBASE_PRIVATE_KEY: "${FIREBASE_PRIVATE_KEY:?FIREBASE_PRIVATE_KEY must be set}"
      FIREBASE_CLIENT_EMAIL: "${FIREBASE_CLIENT_EMAIL:?FIREBASE_CLIENT_EMAIL must be set}"
      FRONTEND_URL: "${FRONTEND_URL:?FRONTEND_URL must be set}"
      ADDITIONAL_ALLOWED_ORIGINS: "${ADDITIONAL_ALLOWED_ORIGINS:-}"
    networks:
      - anime-network

  # MongoDB is internal-only. Do not publish this port to the host.
  mongodb:
    image: mongo:6
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME must be set}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set}"
      MONGO_INITDB_DATABASE: otaku_world
      MONGO_APP_USERNAME: "${MONGO_APP_USERNAME:?MONGO_APP_USERNAME must be set}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD must be set}"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    networks:
      - anime-network

networks:
  anime-network:
    driver: bridge

volumes:
  mongodb_data:
